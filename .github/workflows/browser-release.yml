name: Browser release matrix

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-release:
    name: ${{ matrix.browser }} release gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright-core install --with-deps ${{ matrix.browser }}
      - run: pnpm build
      - run: xvfb-run -a env GL_GAME_LAB_HEADED=1 pnpm browser:release -- --browser=${{ matrix.browser }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-release-${{ matrix.browser }}
          path: .artifacts/browser-release
